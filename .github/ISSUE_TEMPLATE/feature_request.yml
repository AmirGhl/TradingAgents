name: Feature request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Describe the problem you're trying to solve — that's more useful than jumping straight to a solution.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where this is painful or slow today.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would the feature look like? Even a rough description or sketch is fine.

  - type: dropdown
    id: area
    attributes:
      label: Which part of the app?
      options:
        - Chart / live data
        - Strategy signal / backtest
        - Auto-execution / ArmPanel
        - Trade plan / position calculator
        - MetaTrader 5 integration
        - Telegram / notifications
        - Settings / guards
        - Performance / startup
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
